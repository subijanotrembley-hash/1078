<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Script River</title>
    <script>
      // Fix for MediaPipe Emscripten error: "Module.arguments has been replaced with plain arguments_"
      // This must be done as early as possible, before any MediaPipe scripts are loaded.
      (function() {
        try {
          delete window.arguments;
        } catch (e) {}
        window.arguments = undefined;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
